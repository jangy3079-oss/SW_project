spring:
  datasource:
    url: jdbc:mysql://localhost:3306/donga_dating?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root          # TODO: 실제 DB 계정으로 변경
    password: password      # TODO: 각자 로컬 비밀번호로 변경 (절대 커밋 금지)
    driver-class-name: com.mysql.cj.jdbc.Driver

  mail:
    host: smtp.gmail.com
    port: 587
    username: yourgmail@gmail.com   # TODO: 본인 Gmail 주소로 변경
    password: 앱비밀번호              # TODO: Google 앱 비밀번호로 변경 (절대 커밋 금지)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: validate    # schema.sql 로 직접 관리 → validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # schema.sql 초기 실행 (처음 한 번만 실행하고 이후엔 false 로)
  sql:
    init:
      mode: never           # DB 최초 구축 시 always 로 변경 후 실행, 이후 never

  # 사진 업로드 크기 제한
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# 사진 저장 경로 (로컬)
file:
  upload-dir: uploads/profiles

server:
  port: 8080

logging:
  level:
    com.donga.dating: DEBUG
    org.hibernate.SQL: DEBUG

# JWT 설정
jwt:
  secret: my-super-secret-key-1234567890-abcdefghijkl
  access-token-validity: 900000      # 15분 (밀리초)
  refresh-token-validity: 1209600000 # 2주 (밀리초)
